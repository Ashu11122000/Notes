services:

  app:
    build: .

    container_name: notes_app

    ports:
      - "8000:8000"

    depends_on:
      - db

    environment:
      - APP_NAME=Notes Backend
      - DEBUG=True

      - HOST=0.0.0.0
      - PORT=8000

      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=notes_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres

      - SECRET_KEY=supersecretkey
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30

    volumes:
      - .:/app

    restart: always

  db:
    image: postgres:15

    container_name: notes_db

    restart: always

    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=notes_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: